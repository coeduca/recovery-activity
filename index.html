<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦎</text></svg>">
  <title>Actividades de Recuperación | English Ecosystem</title>
  <style>
    /* RESET BRUTALISTA */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #FFE66D; /* Amarillo Rigo */
      color: #1a1a1a;
      padding: 1.2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .brutal-container {
      background-color: #ffffff;
      border: 4px solid #1a1a1a;
      box-shadow: 8px 8px 0px #1a1a1a; /* Sombra adaptada para móviles */
      padding: 1.5rem; /* Ajustado para móviles */
      max-width: 550px;
      width: 100%;
      transform: rotate(-0.5deg);
      transition: all 0.2s ease;
    }

    h1 {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 2.2rem; /* Tamaño inicial para móviles */
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 0.9;
      margin-bottom: 1.5rem;
      background-color: #FF6B9D; /* Rosa Rigo */
      color: white;
      padding: 10px 14px;
      border: 4px solid #1a1a1a;
      display: inline-block;
      transform: rotate(1.5deg);
      box-shadow: 4px 4px 0px #1a1a1a;
      max-width: 100%;
      word-wrap: break-word;
    }

    p {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 2rem;
      line-height: 1.4;
      border-left: 6px solid #4ECDC4; /* Teal Rigo */
      padding-left: 12px;
    }

    .form-group { margin-bottom: 1.8rem; }

    label {
      display: block;
      font-family: 'Arial Black', sans-serif;
      font-size: 1rem;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 1rem;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: bold;
      border: 4px solid #1a1a1a;
      background-color: #A8E6CF;
      outline: none;
      box-shadow: 5px 5px 0px #1a1a1a;
      transition: all 0.1s ease;
    }
    input[type="text"]:focus {
      background-color: #4ECDC4;
      box-shadow: 8px 8px 0px #1a1a1a;
      transform: translate(-2px, -2px);
    }

    .brutal-btn {
      display: block;
      width: 100%;
      padding: 1.2rem;
      font-family: 'Arial Black', sans-serif;
      font-size: 1.3rem;
      text-transform: uppercase;
      color: #ffffff;
      background-color: #1a1a1a;
      border: 4px solid #1a1a1a;
      cursor: pointer;
      box-shadow: 6px 6px 0px #4ECDC4;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }
    .brutal-btn:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0px #FF6B9D;
    }

    .badge-container {
      margin-top: 2.5rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge {
      padding: 6px 12px;
      font-weight: 900;
      border: 3px solid #1a1a1a;
      font-size: 0.85rem;
      text-transform: uppercase;
      box-shadow: 3px 3px 0px #1a1a1a;
    }
    .badge-teal { background-color: #4ECDC4; }
    .badge-pink { background-color: #FF6B9D; color: white; }
    .badge-green { background-color: #A8E6CF; }

    /* MODAL BRUTALISTA */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(26, 26, 26, 0.9);
      z-index: 10000;
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .brutal-modal {
      background-color: #FF6B9D;
      border: 4px solid #1a1a1a;
      box-shadow: 10px 10px 0px #1a1a1a;
      padding: 2rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
      color: #ffffff;
      transform: scale(0.9) rotate(-1deg);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .brutal-modal { transform: scale(1) rotate(1deg); }

    .brutal-modal h2 {
      font-family: 'Impact', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      -webkit-text-stroke: 1px #1a1a1a;
      color: #FFE66D;
    }
    .brutal-modal p {
      border-left: none; padding-left: 0; color: #1a1a1a;
      background: #ffffff; padding: 12px; border: 3px solid #1a1a1a;
      font-size: 1.05rem; font-weight: bold;
    }
    .modal-close-btn {
      margin-top: 1.5rem; background-color: #1a1a1a; color: white;
      padding: 0.8rem 1.5rem; font-family: 'Arial Black', sans-serif;
      text-transform: uppercase; border: none; cursor: pointer;
      box-shadow: 4px 4px 0px #4ECDC4; width: 100%;
    }

    /* MEDIA QUERY PARA AJUSTES EN PC / PANTALLAS GRANDES */
    @media (min-width: 768px) {
      body {
        padding: 2rem;
      }
      .brutal-container {
        padding: 2.5rem;
        box-shadow: 12px 12px 0px #1a1a1a;
      }
      h1 {
        font-size: 3.2rem;
        padding: 12px 18px;
        box-shadow: 6px 6px 0px #1a1a1a;
      }
      .brutal-btn {
        font-size: 1.4rem;
      }
    }
  </style>
  <script src="students.js"></script>
  <script src="rigo.js"></script>
</head>
<body>

  <div class="brutal-container">
    <h1>RECOVERY!</h1>
    <p>Bienvenido al portal de Actividades de Recuperación. ¡Rigo ya está listo en su esquina para darte los mejores hints!</p>

    <div class="form-group">
      <label for="student-nie">Ingresa tu NIE:</label>
      <input type="text" id="student-nie" placeholder="Ej. 20138868" autocomplete="off" maxlength="12">
    </div>

    <button class="brutal-btn" id="enter-btn">¡INGRESAR AHORA!</button>

    <div class="badge-container">
      <span class="badge badge-teal">Teacher Eliseo</span>
      <span class="badge badge-pink">English Class</span>
      <span class="badge badge-green">Coeduca 2026</span>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="brutal-modal">
      <h2>ALERT!</h2>
      <p id="modal-message">No se encontraron actividades vigentes para los parámetros ingresados.</p>
      <button class="modal-close-btn" id="modal-close">CERRAR VENTANA</button>
    </div>
  </div>

  <rigo-mascot id="rigo-companion" grade="Séptimo"></rigo-mascot>

  <script>
    // CRONOGRAMA DE ACTIVIDADES 2026
    const ACTIVITIES_TIMELINE = {
      "Séptimo": [
        { start: "2026-05-16", end: "2026-08-30", url: "septimo/recuperacion2.html" }
      ],
      "Octavo": [
        { start: "2026-05-16", end: "2026-08-30", url: "octavo/recuperacion2.html" }
      ],
      "Noveno": [
        { start: "2026-05-16", end: "2026-08-30", url: "noveno/recuperacion2.html" }
      ],
      "Primer Año": [
        { start: "2026-05-16", end: "2026-08-30", url: "primer_ano/recuperacion2.html" }
      ],
      "Segundo Año": [
        { start: "2026-05-16", end: "2026-08-30", url: "segundo_ano/recuperacion2.html" }
      ]
    };

    document.addEventListener('DOMContentLoaded', () => {
      const rigo = document.getElementById('rigo-companion');
      const nieInput = document.getElementById('student-nie');
      const enterBtn = document.getElementById('enter-btn');
      
      const modalOverlay = document.getElementById('modal-overlay');
      const modalMessage = document.getElementById('modal-message');
      const modalClose = document.getElementById('modal-close');

      setTimeout(() => {
        if (rigo && typeof rigo.welcome === 'function') rigo.welcome();
      }, 1500);

      // Sincronizar dinámicamente a Rigo con el grado del alumno a medida que escribe
      nieInput.addEventListener('input', (e) => {
        const nieValue = e.target.value.trim();
        const db = window.STUDENTS || {};
        const student = db[nieValue];

        if (student && rigo && typeof rigo.setGrade === 'function') {
          rigo.setGrade(student.grade);
        }
      });

      modalClose.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
        if (rigo) rigo.setEmotion('neutral');
      });

      enterBtn.addEventListener('click', () => {
        const nieValue = nieInput.value.trim();

        if (nieValue === "") {
          if (rigo && typeof rigo.say === 'function') {
            rigo.setEmotion('angry');
            rigo.say("¡Oye! Rigo dice que no puedes entrar sin poner tu NIE.", 4000);
          }
          nieInput.focus();
          return;
        }

        // Acceder al objeto global desde students.js
        const db = window.STUDENTS || {};
        const student = db[nieValue];

        if (!student) {
          if (rigo) rigo.setEmotion('confused');
          modalMessage.textContent = `Acceso denegado. El NIE [${nieValue}] no figura en el registro oficial.`;
          modalOverlay.classList.add('active');
          return;
        }

        // Obtener automáticamente el grado desde la base de datos
        const selectedGrade = student.grade;
        if (rigo && typeof rigo.setGrade === 'function') {
          rigo.setGrade(selectedGrade);
        }

        // Simulación controlada por reloj del sistema (Hoy: Julio 2026)
        const today = new Date();
        const activeActivities = ACTIVITIES_TIMELINE[selectedGrade] || [];
        let targetUrl = null;

        for (let period of activeActivities) {
          const start = new Date(period.start + "T00:00:00");
          const end = new Date(period.end + "T23:59:59");

          if (today >= start && today <= end) {
            targetUrl = period.url;
            break;
          }
        }

        if (targetUrl) {
          if (rigo && typeof rigo.loginSuccess === 'function') {
            rigo.loginSuccess(student.name);
            
            enterBtn.disabled = true;
            enterBtn.textContent = "ABRIENDO ACTIVIDAD...";
            enterBtn.style.backgroundColor = "#5AC850";

            setTimeout(() => {
              window.location.href = `${targetUrl}?nie=${nieValue}&student=${encodeURIComponent(student.name)}`;
            }, 3500);
          }
        } else {
          if (rigo) rigo.setEmotion('sad');
          modalMessage.textContent = `¡Hola, ${student.name}! Tus datos son correctos, pero actualmente no hay ningún proceso abierto para ${selectedGrade}.`;
          modalOverlay.classList.add('active');
        }
      });
    });

    // SOLUCIÓN AL ESTADO DEL BOTÓN AL VOLVER ATRÁS
    window.addEventListener('pageshow', (event) => {
      const enterBtn = document.getElementById('enter-btn');
      if (enterBtn) {
        enterBtn.disabled = false;
        enterBtn.textContent = "¡INGRESAR AHORA!";
        enterBtn.style.backgroundColor = "#1a1a1a";
      }
    });
  </script>
</body>
</html>
